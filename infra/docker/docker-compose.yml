version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bull_connect_postgres
    environment:
      POSTGRES_DB: bull_connect
      POSTGRES_USER: bull_admin
      POSTGRES_PASSWORD: bull_secret
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bull_admin -d bull_connect"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: